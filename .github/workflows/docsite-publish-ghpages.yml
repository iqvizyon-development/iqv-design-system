name: Docsite publish to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.artifact_upload.outputs.artifact_id }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Build design system docs
        run: yarn nx run public-docsite-v9:build-storybook:docsite --nxBail

      - name: Prepare artifact
        run: |
          rm -rf _pages
          mkdir -p _pages
          cp -R apps/public-docsite-v9/dist/react/* _pages/

      - name: Upload Pages artifact
        id: artifact_upload
        uses: actions/upload-pages-artifact@v4
        with:
          path: _pages

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.artifact_id
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
