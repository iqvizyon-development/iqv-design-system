name: Docsite publish to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NX_PREFER_TS_NODE: true
  BROWSERSLIST_IGNORE_OLD_DATA: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      artifact_id: ${{ steps.artifact_upload.outputs.artifact_id }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Install Playwright Chromium
        run: yarn playwright install --with-deps chromium

      - name: Build design system docs
        run: yarn nx run react-docsite:build-storybook:docsite --nxBail
        env:
          NODE_OPTIONS: --max_old_space_size=8192

      - name: Prepare artifact
        run: |
          rm -rf _pages
          mkdir -p _pages/react _pages/charts _pages/web-components
          cp -R apps/react-docsite/dist/react/* _pages/react/
          cp -R apps/chart-docsite/dist/storybook/* _pages/charts/
          cp -R packages/web-components/dist/storybook/* _pages/web-components/
          printf '%s\n' '<!doctype html><meta http-equiv="refresh" content="0; url=react/">' > _pages/index.html

      - name: Upload Pages artifact
        id: artifact_upload
        uses: actions/upload-pages-artifact@v4
        with:
          path: _pages

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.artifact_id
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
